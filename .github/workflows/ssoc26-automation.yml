name: SSoC26 Automation

on:
  schedule:
    # Periodic full reconciliation every 2 hours.
    - cron: "0 */2 * * *"

  workflow_dispatch:

  issue_comment:
    types:
      - created

  issues:
    types:
      - opened
      - edited
      - reopened

  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ssoc26-automation-global
  cancel-in-progress: true

env:
  ORG_NAME: Memact
  PYTHONUNBUFFERED: "1"
  AI_ENABLED: "true"
  AI_PROVIDER: gemini
  AI_MODEL: gemini-2.5-flash-lite
  AI_FALLBACK_MODELS: gemini-2.5-flash,gemini-2.0-flash-lite
  AI_MIN_CONFIDENCE: "90"
  AI_AUTO_MERGE: "false"
  AI_MERGE_METHOD: squash
  AI_REVIEW_DRAFT_PRS: "false"
  AI_REVIEW_ON_SCHEDULE: "true"
  AI_MAX_DIFF_CHARS: "20000"
  AI_RETRY_COUNT: "4"
  AI_RETRY_BASE_SECONDS: "2"
  AI_RETRY_MAX_SECONDS: "20"
  AI_RETRY_JITTER_SECONDS: "1.5"
  AI_REQUEST_COOLDOWN_SECONDS: "10"

jobs:
  automation:
    name: SSoC26 Automation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN || github.token }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python
        run: |
          python --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade google-genai

      - name: Verify GitHub CLI
        run: |
          gh --version
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_TOKEN is empty"
            exit 1
          fi
          gh api user --jq .login

      - name: Run SSoC26 Automation Engine
        run: |
          python .github/workflows/scripts/automation.py

      - name: Workflow Summary
        if: always()
        run: |
          echo "======================================"
          echo "SSoC26 Automation Finished"
          echo "Repository : ${{ github.repository }}"
          echo "Actor      : ${{ github.actor }}"
          echo "Event      : ${{ github.event_name }}"
          echo "Run ID     : ${{ github.run_id }}"
          echo "======================================"
