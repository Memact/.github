name: SSoC26 Automation

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"

  workflow_dispatch:

  issue_comment:
    types:
      - created

  issues:
    types:
      - opened
      - edited
      - labeled
      - unlabeled
      - assigned
      - unassigned
      - reopened

  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: write
  metadata: read

concurrency:
  group: ssoc26-automation
  cancel-in-progress: false

env:
  ORG_NAME: Memact
  PYTHONUNBUFFERED: "1"

jobs:
  automation:
    name: SSoC26 Automation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Verify GitHub CLI
        run: |
          gh --version
          gh auth status

      - name: Run SSoC26 Automation Engine
        run: |
          python .github/workflows/scripts/automation.py

      - name: Workflow Summary
        if: always()
        run: |
          echo "======================================"
          echo "SSoC26 Automation Finished"
          echo "Repository : ${{ github.repository }}"
          echo "Actor      : ${{ github.actor }}"
          echo "Event      : ${{ github.event_name }}"
          echo "Run ID     : ${{ github.run_id }}"
          echo "======================================"
