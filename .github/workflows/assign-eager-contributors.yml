name: Assign Eager Contributors

on:
  schedule:
    # Runs every hour at the top of the hour (UTC)
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  assign-contributors:
    name: Scan & Assign Eager Contributors
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN }}

    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run contributor assignment script
        run: |
          python .github/workflows/scripts/assign_eager_contributors.py
