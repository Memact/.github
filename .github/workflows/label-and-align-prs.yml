name: Label & Align PRs

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  label-align:
    name: Fix Label Typos & Align PR Labels
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN }}

    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run PR label alignment script
        run: |
          python .github/workflows/scripts/label_and_align_prs.py
