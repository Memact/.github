<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Memact profile banner</title>
  <desc id="desc">Memact profile banner with a fast logo and tagline animation.</desc>

  <rect width="1200" height="360" rx="34" fill="#00011B"/>
  <rect x="1" y="1" width="1198" height="358" rx="33" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>

  <g opacity="0.5">
    <path d="M0 288C208 246 356 318 574 276C750 242 934 252 1200 214V360H0V288Z" fill="#101126">
      <animate attributeName="d" dur="4s" repeatCount="indefinite"
        values="M0 288C208 246 356 318 574 276C750 242 934 252 1200 214V360H0V288Z;
                M0 270C218 306 398 248 586 286C776 322 980 244 1200 270V360H0V270Z;
                M0 288C208 246 356 318 574 276C750 242 934 252 1200 214V360H0V288Z"/>
    </path>
  </g>

  <g transform="translate(600 122)" text-anchor="middle" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">
    <text y="0" fill="rgba(255,255,255,0.42)" font-size="54" font-weight="800" letter-spacing="-2.6">
      memact
      <animate attributeName="opacity" dur="3.4s" repeatCount="indefinite" values="0;0.75;0.75;0.55;0.75"/>
      <animateTransform attributeName="transform" type="translate" dur="3.4s" repeatCount="indefinite" values="0 8;0 0;0 0;0 -1;0 0"/>
    </text>
  </g>

  <g transform="translate(600 210)" text-anchor="middle" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">
    <text y="0" fill="#FFFFFF" font-size="52" font-weight="800" letter-spacing="-2.4">
      Personalization made better
      <animate attributeName="opacity" dur="3.4s" repeatCount="indefinite" values="0;0.15;1;1;1"/>
      <animateTransform attributeName="transform" type="translate" dur="3.4s" repeatCount="indefinite" values="0 10;0 4;0 0;0 0;0 0"/>
    </text>
    <text y="58" fill="rgba(255,255,255,0.62)" font-size="30" font-weight="760" letter-spacing="-1.2">
      with Memact
      <animate attributeName="opacity" dur="3.4s" repeatCount="indefinite" values="0;0;0.35;1;1"/>
      <animateTransform attributeName="transform" type="translate" dur="3.4s" repeatCount="indefinite" values="0 10;0 10;0 4;0 0;0 0"/>
    </text>
  </g>
</svg>
